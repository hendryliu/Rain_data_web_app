<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Singapore Rainfall</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #map { height: 50vh; width: 100%; }
  #chart-container {
    height: 50vh; width: 100%; padding: 10px;
    display: flex; flex-direction: column;
  }
  #controls {
    display: flex; align-items: center; gap: 12px;
    padding: 6px 0; flex-shrink: 0;
  }
  #station-label { font-weight: 600; font-size: 1.1em; }
  #year-select { padding: 4px 8px; font-size: 0.95em; }
  #loading { display: none; color: #666; font-style: italic; }
  #chart { flex: 1; min-height: 0; }
  #placeholder {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #999; font-size: 1.2em;
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="chart-container">
  <div id="controls">
    <span id="station-label"></span>
    <select id="year-select" style="display:none">
      <option value="">All years</option>
      <option value="2016">2016</option>
      <option value="2017">2017</option>
      <option value="2018">2018</option>
      <option value="2019">2019</option>
      <option value="2020">2020</option>
      <option value="2021">2021</option>
      <option value="2022">2022</option>
      <option value="2023">2023</option>
      <option value="2024">2024</option>
    </select>
    <span id="loading">Loading...</span>
  </div>
  <div id="placeholder">Click a station on the map to view rainfall data</div>
  <div id="chart"></div>
</div>

<script>
const map = L.map('map').setView([1.35, 103.82], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 18
}).addTo(map);

let selectedStation = null;

fetch('/api/stations')
  .then(r => r.json())
  .then(stations => {
    stations.forEach(s => {
      const marker = L.circleMarker([s.lat, s.lng], {
        radius: 6, color: '#1976d2', fillColor: '#42a5f5',
        fillOpacity: 0.8, weight: 1.5
      }).addTo(map);
      marker.bindPopup(`<b>${s.name}</b><br>ID: ${s.id}`);
      marker.on('click', () => selectStation(s));
    });
  });

function selectStation(station) {
  selectedStation = station;
  document.getElementById('station-label').textContent = station.name;
  document.getElementById('year-select').style.display = '';
  loadRainfall();
}

document.getElementById('year-select').addEventListener('change', () => {
  if (selectedStation) loadRainfall();
});

function loadRainfall() {
  const year = document.getElementById('year-select').value;
  const url = `/api/rainfall/${selectedStation.id}` + (year ? `?year=${year}` : '');

  document.getElementById('loading').style.display = '';
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('chart').style.display = '';

  fetch(url)
    .then(r => r.json())
    .then(data => {
      document.getElementById('loading').style.display = 'none';
      const timestamps = data.map(d => d.timestamp);
      const values = data.map(d => d.value);

      Plotly.newPlot('chart', [{
        x: timestamps, y: values, type: 'scatter', mode: 'lines',
        line: { color: '#1976d2', width: 1 },
        name: 'Rainfall'
      }], {
        title: `Rainfall — ${selectedStation.name}`,
        xaxis: { title: 'Time' },
        yaxis: { title: 'Rainfall (mm)' },
        margin: { t: 40, b: 50, l: 60, r: 20 },
        height: undefined
      }, {
        responsive: true
      });
    })
    .catch(() => {
      document.getElementById('loading').style.display = 'none';
    });
}
</script>
</body>
</html>
